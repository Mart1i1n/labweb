<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">攻击演示</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e17;
  --bg2: #111827;
  --card: #141c2b;
  --border: rgba(99,179,237,.1);
  --accent: #60a5fa;
  --accent-b: #93c5fd;
  --green: #34d399;
  --red: #f87171;
  --amber: #fbbf24;
  --purple: #a78bfa;
  --txt: #e2e8f0;
  --txt2: #94a3b8;
  --txt3: #64748b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC','Inter',sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden;font-size:18px}

/* Top bar */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:52px;display:flex;align-items:center;
  padding:0 2rem;gap:1rem;
  background:rgba(10,14,23,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.back-btn{
  color:var(--txt2);text-decoration:none;font-size:1.05rem;
  display:flex;align-items:center;gap:.3rem;
  transition:color .3s;
}
.back-btn:hover{color:var(--accent-b)}
.topbar-title{font-size:1.1rem;font-weight:600;color:var(--txt)}
.topbar-venue{
  font-family:'JetBrains Mono',monospace;font-size:.85rem;
  padding:.12rem .4rem;border-radius:3px;
  background:rgba(248,113,113,.1);color:var(--red);font-weight:600;
}

/* Hero */
.demo-hero{
  padding:6rem 2.5rem 2.5rem;
  border-bottom:1px solid var(--border);
  position:relative;overflow:hidden;
}
.demo-hero::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(96,165,250,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(96,165,250,.02) 1px,transparent 1px);
  background-size:50px 50px;
  mask-image:radial-gradient(ellipse 70% 60% at 50% 50%,black,transparent);
}
.demo-hero-inner{position:relative;max-width:900px}
.demo-hero h1{font-size:clamp(2.4rem,4vw,3.4rem);font-weight:800;line-height:1.3;margin-bottom:.8rem}
.demo-hero h1 .hl{
  background:linear-gradient(135deg,var(--accent-b),var(--green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.demo-hero-desc{font-size:1.25rem;color:var(--txt2);max-width:650px;line-height:1.7;font-weight:300}
.demo-meta{
  display:flex;gap:2rem;margin-top:1.5rem;flex-wrap:wrap;
}
.demo-meta-item{
  border-left:2px solid var(--accent);padding-left:.8rem;
}
.demo-meta-val{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:700;color:var(--accent-b)}
.demo-meta-lbl{font-size:.95rem;color:var(--txt3)}

/* Main canvas area */
.demo-main{padding:2.5rem}

/* Blockchain animation */
.chain-container{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1.5rem;
  margin-bottom:1.5rem;
  position:relative;
  overflow:hidden;
}
.chain-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1rem;
}
.chain-title{font-size:1.15rem;font-weight:600}
.chain-badge{
  font-family:'JetBrains Mono',monospace;font-size:.85rem;
  padding:.15rem .45rem;border-radius:3px;
  background:rgba(52,211,153,.08);color:var(--green);
  border:1px solid rgba(52,211,153,.15);
}
.chain-canvas{
  width:100%;height:280px;
  display:block;
}

/* Slot timeline */
.slots-container{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1.5rem;
  margin-bottom:1.5rem;
}
.slots-title{font-size:1.15rem;font-weight:600;margin-bottom:1rem}
.slots-row{
  display:flex;gap:4px;overflow-x:auto;
  padding-bottom:.5rem;
}
.slot{
  min-width:48px;height:56px;
  border-radius:6px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;
  font-size:.85rem;gap:2px;
  transition:all .3s;
  border:1px solid transparent;
  cursor:default;
}
.slot.honest{background:rgba(96,165,250,.1);color:var(--accent);border-color:rgba(96,165,250,.15)}
.slot.attack{background:rgba(248,113,113,.1);color:var(--red);border-color:rgba(248,113,113,.2)}
.slot.empty{background:rgba(148,163,184,.04);color:var(--txt3);border-color:rgba(148,163,184,.06)}
.slot.pending{background:rgba(251,191,36,.08);color:var(--amber);border-color:rgba(251,191,36,.15)}
.slot-num{font-size:.78rem;opacity:.6}

/* Controls */
.controls{
  display:flex;gap:.8rem;margin-bottom:1.5rem;flex-wrap:wrap;
}
.ctrl-btn{
  padding:.5rem 1.2rem;
  font-size:1.05rem;font-weight:600;
  border:1px solid var(--border);
  border-radius:6px;background:var(--card);
  color:var(--txt2);cursor:pointer;
  transition:all .3s;
  font-family:'Noto Sans SC',sans-serif;
}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent-b)}
.ctrl-btn.active{background:rgba(96,165,250,.1);border-color:var(--accent);color:var(--accent-b)}
.ctrl-btn.danger{border-color:rgba(248,113,113,.2)}
.ctrl-btn.danger:hover{border-color:var(--red);color:var(--red)}
.ctrl-btn.danger.active{background:rgba(248,113,113,.1);border-color:var(--red);color:var(--red)}

/* Placeholder overlay */
.placeholder-overlay{
  position:relative;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:3rem 2rem;
  text-align:center;
}
.placeholder-overlay .ph-icon{
  font-size:2.5rem;margin-bottom:1rem;
  opacity:.4;
}
.placeholder-overlay .ph-title{
  font-size:1.35rem;font-weight:600;margin-bottom:.4rem;
}
.placeholder-overlay .ph-desc{
  font-size:1.1rem;color:var(--txt3);max-width:400px;margin:0 auto;
}
.placeholder-overlay .ph-tag{
  display:inline-block;margin-top:1rem;
  font-family:'JetBrains Mono',monospace;font-size:.9rem;
  padding:.2rem .6rem;border-radius:3px;
  background:rgba(96,165,250,.06);color:var(--txt3);
  border:1px solid var(--border);
}

/* Legend */
.legend{
  display:flex;gap:1.5rem;
  margin-top:1rem;flex-wrap:wrap;
}
.legend-item{
  display:flex;align-items:center;gap:.4rem;
  font-size:.95rem;color:var(--txt3);
}
.legend-dot{width:8px;height:8px;border-radius:2px}

@media(max-width:768px){
  .demo-hero,.demo-main{padding:4rem 1.2rem 1.5rem}
  .chain-canvas{height:200px}
}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="./lab-showcase.html">← 返回主页</a>
  <span class="topbar-title" id="topTitle">攻击演示</span>
  <span class="topbar-venue" id="topVenue">VENUE</span>
</div>

<div class="demo-hero">
  <div class="demo-hero-inner">
    <h1 id="heroTitle">攻击<span class="hl">演示</span></h1>
    <p class="demo-hero-desc" id="heroDesc">攻击动画演示占位区域，后续将填充具体的攻击流程与可视化动画。</p>
    <div class="demo-meta" id="heroMeta"></div>
  </div>
</div>

<div class="demo-main">
  <!-- Controls -->
  <div class="controls">
    <button class="ctrl-btn active" onclick="toggleMode('normal')">▶ 正常出块</button>
    <button class="ctrl-btn danger" onclick="toggleMode('attack')">⚡ 发动攻击</button>
    <button class="ctrl-btn" onclick="resetChain()">↺ 重置</button>
  </div>

  <!-- Blockchain growth animation -->
  <div class="chain-container">
    <div class="chain-header">
      <span class="chain-title">区块链增长可视化</span>
      <span class="chain-badge" id="chainStatus">● 正常运行</span>
    </div>
    <canvas class="chain-canvas" id="chainCanvas"></canvas>
    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:var(--accent)"></span>诚实区块</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--red)"></span>攻击区块</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--amber)"></span>待确认</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--txt3)"></span>空 Slot</div>
    </div>
  </div>

  <!-- Slot timeline -->
  <div class="slots-container">
    <div class="slots-title">Epoch · Slot 时间线</div>
    <div class="slots-row" id="slotsRow"></div>
  </div>

  <!-- Attack flow placeholder -->
  <div class="placeholder-overlay">
    <div class="ph-icon">🔬</div>
    <div class="ph-title">攻击流程动画 · 待填充</div>
    <div class="ph-desc">此区域将展示该攻击的详细流程动画，包括攻击者行为序列、诚实节点响应、以及最终攻击效果的可视化演示。</div>
    <span class="ph-tag">// TODO: 填充具体攻击流程</span>
  </div>
</div>

<script>
// ===== Parse URL params for demo identity =====
const params = new URLSearchParams(location.search);
const demoId = params.get('id') || 'default';

const demos = {
  'web3-blind': {
    title: 'Web3登录<span class="hl">盲消息攻击</span>演示',
    venue: 'ACM CCS 2024',
    desc: '恶意网站利用目标网站的签名消息，诱导用户签名后窃取链下数据访问权限。受影响用户超200万，影响Dapp总市值约40亿美元。',
    meta: [['200万+', '受影响用户'], ['40亿', '影响市值(美元)'], ['Top 25', 'Dapp网站']]
  },
  'eth-liveness': {
    title: '以太坊PoS<span class="hl">零成本活性攻击</span>演示',
    venue: 'IEEE S&P 2026',
    desc: '无需操控网络、不触发罚没条件，最低仅需23.8%验证者即可导致无区块被最终确认或完全操控交易顺序。',
    meta: [['23.8%', '最低攻击阈值'], ['< 1/3', '低于安全假设'], ['~5000亿', '影响市值(美元)']]
  },
  'eth-staircase': {
    title: '以太坊<span class="hl">阶梯攻击</span>演示',
    venue: 'Usenix Security 2024',
    desc: '敌手仅需控制29.6%账户余额，即可让所有诚实节点丧失收益甚至负收益。以太坊官方评价该工作"essential"。',
    meta: [['29.6%', '攻击阈值'], ['0', '诚实节点收益'], ['~5000亿', '影响市值(美元)']]
  },
  'bunnyfinder': {
    title: '<span class="hl">BunnyFinder</span>：自动化激励漏洞发掘',
    venue: 'NDSS 2026',
    desc: '借鉴软件错误注入思想，结合强化学习自动生成攻击策略，发现三种新型激励机制攻击。',
    meta: [['3', '新型攻击发现'], ['RL', '强化学习驱动'], ['自动化', '策略生成']]
  },
  'eth-aa': {
    title: '<span class="hl">AA机制</span>：可证明安全的链重组防御',
    venue: 'Usenix Security 2025',
    desc: '基于f+1投票提出"存在性投票"机制，在网络同步时彻底解决链重组问题。获以太坊基金会关注并推进EIP落地。',
    meta: [['f+1', '投票阈值'], ['0', '重组概率(同步)'], ['EIP', '推进落地']]
  },
  'bsc-finality': {
    title: '币安链<span class="hl">共识活性攻击</span>演示',
    venue: 'Usenix Security 2025',
    desc: '针对币安Fast Finality机制提出三种攻击，使区块确认速度降低一个量级甚至完全无法出块。',
    meta: [['3', '攻击变种'], ['10x', '确认延迟'], ['~1000亿', '影响市值(美元)']]
  },
  'polkadot-selfish': {
    title: '波卡链<span class="hl">无风险自私挖矿</span>演示',
    venue: 'WWW 2026',
    desc: '首个混合可预测性模型下的无风险自私挖矿攻击，在低于20%质押量时攻击收益超过比特币经典自私挖矿。',
    meta: [['< 20%', '攻击质押量'], ['0', '攻击风险'], ['~70亿', '影响市值(美元)']]
  },
  'dapp-central': {
    title: 'DApp生态<span class="hl">中心化安全风险</span>',
    venue: 'WWW 2023 / TDSC',
    desc: '96.4%钱包存在安全风险（总下载量超1亿次），83.5%链上合约存在权限滥用（含260个知名合约，总市值~980亿）。',
    meta: [['96.4%', '钱包受影响'], ['1亿+', '下载量'], ['980亿', '合约市值(美元)']]
  }
};

const d = demos[demoId] || demos['eth-liveness'];
document.getElementById('pageTitle').textContent = d.title.replace(/<[^>]*>/g, '') + ' — 攻击演示';
document.getElementById('topTitle').textContent = d.title.replace(/<[^>]*>/g, '');
document.getElementById('topVenue').textContent = d.venue;
document.getElementById('heroTitle').innerHTML = d.title;
document.getElementById('heroDesc').textContent = d.desc;

const metaEl = document.getElementById('heroMeta');
d.meta.forEach(([v, l]) => {
  metaEl.innerHTML += `<div class="demo-meta-item"><div class="demo-meta-val">${v}</div><div class="demo-meta-lbl">${l}</div></div>`;
});

// ===== Blockchain Canvas Animation =====
const canvas = document.getElementById('chainCanvas');
const ctx = canvas.getContext('2d');
let W, H;
let blocks = [];
let mode = 'normal';
let frame = 0;
let slotCount = 0;

function resize() {
  W = canvas.width = canvas.offsetWidth * devicePixelRatio;
  H = canvas.height = canvas.offsetHeight * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}

function addBlock() {
  const isAttack = mode === 'attack';
  const isEmpty = isAttack && Math.random() < 0.35;
  const w = canvas.offsetWidth;

  const block = {
    slot: slotCount++,
    x: blocks.length > 0 ? blocks[blocks.length - 1].x + 72 : 40,
    y: canvas.offsetHeight / 2 - 20 + (isAttack ? (Math.random() - 0.5) * 60 : 0),
    w: 56,
    h: 40,
    type: isEmpty ? 'empty' : (isAttack && Math.random() < 0.5 ? 'attack' : 'honest'),
    alpha: 0,
    fork: isAttack && Math.random() < 0.2 ? {
      y: canvas.offsetHeight / 2 - 20 + (Math.random() - 0.5) * 80,
      type: 'attack'
    } : null
  };
  blocks.push(block);

  // Add slot to timeline
  addSlotUI(block);
}

function addSlotUI(block) {
  const row = document.getElementById('slotsRow');
  const el = document.createElement('div');
  el.className = 'slot ' + block.type;
  el.innerHTML = `<span>${block.type === 'honest' ? '✓' : block.type === 'attack' ? '✗' : '·'}</span><span class="slot-num">#${block.slot}</span>`;
  row.appendChild(el);
  row.scrollLeft = row.scrollWidth;
}

function drawChain() {
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  ctx.clearRect(0, 0, w, h);

  // Scroll offset
  const maxX = blocks.length > 0 ? blocks[blocks.length - 1].x + 72 : 0;
  const scrollOff = Math.max(0, maxX - w + 80);

  // Draw connections
  for (let i = 1; i < blocks.length; i++) {
    const prev = blocks[i - 1], curr = blocks[i];
    const px = prev.x - scrollOff + prev.w / 2;
    const cx = curr.x - scrollOff;
    const py = prev.y + prev.h / 2;
    const cy = curr.y + curr.h / 2;

    if (px > -100 && cx < w + 100) {
      ctx.beginPath();
      ctx.moveTo(px + prev.w / 2, py);
      ctx.lineTo(cx, cy);
      const colors = { honest: '96,165,250', attack: '248,113,113', empty: '100,116,139' };
      ctx.strokeStyle = `rgba(${colors[curr.type] || '96,165,250'}, ${curr.alpha * 0.4})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Fork line
    if (curr.fork) {
      const fy = curr.fork.y + 20;
      if (px > -100 && cx < w + 100) {
        ctx.beginPath();
        ctx.moveTo(px + prev.w / 2, py);
        ctx.lineTo(cx + 28, fy);
        ctx.strokeStyle = `rgba(248,113,113,${curr.alpha * 0.3})`;
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }
  }

  // Draw blocks
  blocks.forEach(b => {
    b.alpha = Math.min(1, b.alpha + 0.04);
    const bx = b.x - scrollOff;
    if (bx < -100 || bx > w + 100) return;

    const colors = {
      honest: { fill: 'rgba(96,165,250,0.15)', stroke: 'rgba(96,165,250,0.4)' },
      attack: { fill: 'rgba(248,113,113,0.15)', stroke: 'rgba(248,113,113,0.4)' },
      empty: { fill: 'rgba(100,116,139,0.06)', stroke: 'rgba(100,116,139,0.15)' }
    };
    const c = colors[b.type] || colors.honest;

    ctx.globalAlpha = b.alpha;
    ctx.fillStyle = c.fill;
    ctx.strokeStyle = c.stroke;
    ctx.lineWidth = 1;
    roundRect(ctx, bx, b.y, b.w, b.h, 5);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = b.type === 'attack' ? '#f87171' : b.type === 'empty' ? '#64748b' : '#93c5fd';
    ctx.font = '600 13px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText(`#${b.slot}`, bx + b.w / 2, b.y + b.h / 2 + 3);
    ctx.globalAlpha = 1;

    // Fork block
    if (b.fork) {
      const fc = colors.attack;
      ctx.globalAlpha = b.alpha * 0.7;
      ctx.fillStyle = fc.fill;
      ctx.strokeStyle = fc.stroke;
      roundRect(ctx, bx, b.fork.y, b.w, b.h, 5);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#f87171';
      ctx.font = '600 12px JetBrains Mono';
      ctx.fillText('fork', bx + b.w / 2, b.fork.y + b.h / 2 + 3);
      ctx.globalAlpha = 1;
    }
  });

  requestAnimationFrame(drawChain);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function toggleMode(m) {
  mode = m;
  document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  const badge = document.getElementById('chainStatus');
  if (m === 'attack') {
    badge.textContent = '⚠ 攻击中';
    badge.style.background = 'rgba(248,113,113,.08)';
    badge.style.color = '#f87171';
    badge.style.borderColor = 'rgba(248,113,113,.15)';
  } else {
    badge.textContent = '● 正常运行';
    badge.style.background = '';
    badge.style.color = '';
    badge.style.borderColor = '';
  }
}

function resetChain() {
  blocks = [];
  slotCount = 0;
  document.getElementById('slotsRow').innerHTML = '';
  mode = 'normal';
  document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.ctrl-btn').classList.add('active');
  const badge = document.getElementById('chainStatus');
  badge.textContent = '● 正常运行';
  badge.style.background = '';
  badge.style.color = '';
  badge.style.borderColor = '';
}

// Auto-add blocks
let blockInterval;
function startAutoBlocks() {
  blockInterval = setInterval(() => {
    addBlock();
  }, 900);
}

window.addEventListener('resize', resize);
resize();
drawChain();
startAutoBlocks();
</script>
</body>
</html>
